# Pings the app's new-showing watcher around the clock so a fresh booking on
# the ShowingTime calendar triggers a notification within minutes — even when
# nobody has the app open. GitHub schedules can drift a few minutes; the
# endpoint throttles itself, so overlapping pings are harmless.
name: Showing watcher
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the watcher
        run: curl -fsS -m 30 "https://gpflips.com/api/showings/watch" || true
